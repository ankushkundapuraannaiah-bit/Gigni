  <style>
    :root {

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Outfit', sans-serif;

      z-index: -1;

      display: flex;

      padding: 40px 24px;

    }

    .verify-card {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(25px);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 44px;
      width: 100%;
      max-width: 600px;
      box-shadow: 0 20px 50px rgba(124,58,237,0.08), 0 0 0 1px rgba(255,255,255,0.6) inset;
      animation: fadeInUp 0.5s ease-out;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .verify-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .verify-header h1 {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: -0.03em;
      margin-bottom: 8px;
      background: linear-gradient(135deg, var(--ink), var(--purple));

      background-clip: text;
    }

    .verify-header p {
      color: var(--muted);
      font-size: 15px;
      font-weight: 500;

    }

    .input-group {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }

      flex: 1;

      border-color: var(--purple);
      background: var(--white);

      padding: 0 28px;
      font-weight: 800;

      display: flex;
      align-items: center;

    /* ── RESULTS ── */

    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }

    /* Loading Spinner */
    .loader {
      display: none;

    @keyframes spin {

    /* Success Card */

      border-radius: 999px;
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;

    .error-card h3 {
      font-size: 20px;

<body>

  <canvas id="bg-canvas"></canvas>

  <nav>
    <a href="/" class="logo">GIGNI</a>
    <a href="/" class="home-link"><span class="material-icons" style="font-size: 16px;">arrow_back</span> Back to Home</a>
  </nav>

  <div class="main-content">
    <div class="verify-card">
      <div class="verify-header">
        <h1>Verify Student Credential</h1>
        <p>Confirm the legitimacy of credentials issued by Team Gigni. Enter the certificate verification code below.</p>
      </div>

      <div class="input-group">
        <input type="text" id="cert-no-input" placeholder="e.g. GIG-20260525-4F8X" autocomplete="off" spellcheck="false">
        <button onclick="performVerification()">
          <span class="material-icons">verified_user</span> Verify
        </button>
      </div>

      <!-- LOADER -->
      <div class="loader" id="verify-loader">
        <div class="spinner"></div>
      </div>

      <!-- RESULTS CONTAINER -->
      <div class="result-container" id="verify-results">
        <!-- Will be dynamically populated -->
      </div>
    </div>
  </div>

  <footer>
    <p>&copy; 2026 Team Gigni. All rights reserved.</p>
  </footer>

  <script>
    // Search on Enter key press
    document.getElementById('cert-no-input').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        performVerification();
      }
    });

    // Check URL parameters for auto-verification on load
    window.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code') || params.get('no');
      if (code) {
        document.getElementById('cert-no-input').value = code;
        performVerification();
      }
    });

    async function performVerification() {
      const codeInput = document.getElementById('cert-no-input');
      const code = codeInput.value.trim();
      
      const loader = document.getElementById('verify-loader');
      const resultsWrap = document.getElementById('verify-results');

      if (!code) {
        alert('Please enter a certificate number.');
        return;
      }

      // Reset & show loading state
      resultsWrap.classList.remove('active');
      resultsWrap.innerHTML = '';
      loader.classList.add('active');

      try {
        const res = await fetch(`/api/certificate/verify/${encodeURIComponent(code)}`);
        const data = await res.json();
        
        loader.classList.remove('active');
        resultsWrap.classList.add('active');

        if (res.ok && data.success) {
          const cert = data.certificate;
          
          resultsWrap.innerHTML = `
            <div class="success-card">
              <div class="badge-verified">
                <span class="material-icons" style="font-size: 14px;">check_circle</span> Verified Credential
              </div>
              <div class="detail-grid">
                <div class="detail-item">
                  <div class="detail-label">Certificate Code</div>
                  <div class="detail-val" style="font-family: monospace; letter-spacing: 0.02em;">${cert.certificate_no}</div>
                </div>
                <div class="detail-item">
                  <div class="detail-label">Recipient Name</div>
                  <div class="detail-val">${cert.recipient_name}</div>
                </div>
                <div class="detail-item">
                  <div class="detail-label">Verified Course / Track</div>
                  <div class="detail-val">${cert.course_name}</div>
                </div>
                <div class="detail-item">
                  <div class="detail-label">Date of Issue</div>
                  <div class="detail-val">${cert.date_of_issue}</div>
                </div>
              </div>
              <a href="${cert.certificate_data}" download="${cert.course_name.replace(/\s+/g, '-')}-Certificate-${cert.certificate_no}" class="btn-download" style="margin-top: 10px;">
                <span class="material-icons">download</span> Download Certificate
              </a>
            </div>
          `;
        } else {
          // Error/Not found state
          resultsWrap.innerHTML = `
            <div class="error-card">
              <div class="badge-error">
                <span class="material-icons" style="font-size: 14px;">warning</span> Record Not Found
              </div>
              <h3>Invalid Certificate Number</h3>
              <p style="margin-top: 8px;">The certificate code <strong>${escapeHtml(code)}</strong> could not be found in Gigni's registry database. Please check for spelling mistakes and try again.</p>
            </div>
          `;
        }
      } catch (err) {
        loader.classList.remove('active');
        resultsWrap.classList.add('active');
        resultsWrap.innerHTML = `
          <div class="error-card">
            <div class="badge-error">
              <span class="material-icons" style="font-size: 14px;">error</span> Verification Error
            </div>
            <h3>Network Sync Failure</h3>
            <p style="margin-top: 8px;">Could not connect to the verification API. Please check your internet connection and try again.</p>
          </div>
        `;
      }
    }

    function escapeHtml(val) {
      return String(val || '').replace(/[&<>"']/g, ch => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[ch]));
    }

    // ── THREE.JS PARTICLE BACKGROUND ──
    const canvas = document.getElementById('bg-canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 5;

    const pCount = 1200;
    const pPos = new Float32Array(pCount * 3);
    for(let i=0; i<pCount*3; i++) {
      pPos[i] = (Math.random() - 0.5) * 15;
    }

    const pGeo = new THREE.BufferGeometry();
    pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
    const pMat = new THREE.PointsMaterial({ size: 0.022, color: 0x7c3aed, transparent: true, opacity: 0.45 });
    const points = new THREE.Points(pGeo, pMat);
    scene.add(points);
    
    function animate() { 
      requestAnimationFrame(animate); 
      points.rotation.y += 0.0004; 
      points.rotation.x += 0.0002;
      renderer.render(scene, camera); 
    }
    animate();
    
    window.onresize = () => { 
      renderer.setSize(window.innerWidth, window.innerHeight); 
      camera.aspect = window.innerWidth / window.innerHeight; 
      camera.updateProjectionMatrix(); 
    };
  </script>
</body>
