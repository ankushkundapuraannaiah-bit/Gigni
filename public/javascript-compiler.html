    .btn-action {

      background: var(--btn-bg);
      color: var(--btn-text);
      padding: 7px 12px;
      font-family: inherit;
      font-weight: 700;
      font-size: 12px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      transition: all 0.2s;

    .btn-action:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 10px var(--accent-light);
    }

    .btn-run {
      border: 0;
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      color: #fff;
      padding: 8px 20px;
      border-radius: 8px;

      transform: none;
      box-shadow: none;
    }

      height: 100%;
      position: relative;
      overflow: hidden;
      background: var(--bg-editor);
    }

    /* ── CONSOLE / STDIN ── */
    .console-split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      flex: 1;
      min-height: 0;
    }
    @media (max-width: 768px) {
      .console-split { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }

    .console-header-tab {
      padding: 8px 16px;

      font-size: 11.5px;

      height: 100%;

      flex: 1;
      padding: 12px 16px;
      font-family: 'Fira Code', monospace;
      font-size: 13px;
      color: var(--terminal-stdout);
      background: var(--bg-terminal);
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
      line-height: 1.6;
      transition: background var(--transition), color var(--transition);
    }
    #terminal-stdout.has-error { color: var(--red); }
    #terminal-stdout.has-system { color: var(--terminal-system); }

    .stdin-textarea {
      flex: 1;
      border: 0;
      background: var(--bg-terminal);
      color: var(--text-primary);
      padding: 12px 16px;
      font-family: 'Fira Code', monospace;
      font-size: 13px;
      resize: none;
      outline: none;
      transition: background var(--transition);

    .console-footer {
      background: rgba(0, 0, 0, 0.02);
      border-top: 1px solid var(--border-color);
      padding: 6px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 11px;
      color: var(--text-secondary);
      font-weight: 700;
      font-family: 'Fira Code', monospace;
    }

    /* ── SETTINGS MODAL ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s ease-out;
    }
    .modal-overlay.active { display: flex; opacity: 1; }
    .modal-container {
      background: var(--bg-panel);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      width: min(450px, 90%);
      overflow: hidden;
      transform: translateY(20px);
      transition: transform 0.2s ease-out;
      box-shadow: 0 20px 50px rgba(0,0,0,0.3);

    .modal-overlay.active .modal-container { transform: translateY(0); }
    .modal-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .modal-header h3 { font-size: 16px; font-weight: 800; }
    .close-modal-btn { background: none; border: 0; font-size: 20px; color: var(--text-secondary); cursor: pointer; }
    .modal-body { padding: 20px; display: grid; gap: 16px; }
    .setting-row { display: grid; grid-template-columns: 1fr 1.2fr; align-items: center; gap: 10px; }
    .setting-row label { font-size: 13px; font-weight: 700; color: var(--text-secondary); }
    .setting-row select {
      background: var(--bg-editor);
      color: var(--text-primary);
      border: 1px solid var(--border-color);
      padding: 8px 12px;
      border-radius: 8px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      outline: none;
      cursor: pointer;

    /* ── MOBILE ── */
    .menu-toggle { display: none; background: none; border: none; cursor: pointer; padding: 8px; z-index: 2001; }
    .hamburger { display: block; width: 22px; height: 2px; background: var(--accent); position: relative; transition: 0.3s; }
    .hamburger::before, .hamburger::after { content: ''; position: absolute; width: 100%; height: 100%; background: var(--accent); transition: 0.3s; }
    .hamburger::before { top: -6px; left: 0; }
    .hamburger::after { bottom: -6px; left: 0; }
    .menu-toggle.active .hamburger { background: transparent; }
    .menu-toggle.active .hamburger::before { transform: rotate(45deg); top: 0; }
    .menu-toggle.active .hamburger::after { transform: rotate(-45deg); bottom: 0; }
    body.developer .hamburger, body.developer .hamburger::before, body.developer .hamburger::after { background: #00ff88; }

    @media (min-width: 992px) {
      .workspace {
        flex-direction: row;
      }
      .editor-panel {
        flex: 1.4;
        height: 100%;

      .console-panel {
        flex: 0.8;
        height: 100%;
      }
      .console-split {

        grid-template-rows: 1fr 1fr;
        height: 100%;
      }
      .console-section:first-child {
        border-right: none;
        border-bottom: 1px solid var(--border-color);
      }
    }
  </style>

  </div>

  <!-- ══════ SETTINGS MODAL ═══════════════════════════════════════════════════ -->
  <div class="modal-overlay" id="settings-modal-overlay" onclick="closeSettingsModalOutside(event)">
    <div class="modal-container">
      <div class="modal-header">
        <h3>Editor Settings</h3>
        <button class="close-modal-btn" onclick="toggleSettingsModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="setting-row">
          <label for="setting-theme">Editor Theme</label>
          <select id="setting-theme" onchange="changeEditorSetting('theme', this.value)">
            <option value="vs">Light (vs)</option>
            <option value="vs-dark">Dark (vs-dark)</option>
            <option value="hc-black">High Contrast</option>
          </select>
        </div>
        <div class="setting-row">
          <label for="setting-fontsize">Font Size</label>
          <select id="setting-fontsize" onchange="changeEditorSetting('fontSize', this.value)">
            <option value="12">12 px</option>
            <option value="14">14 px</option>
            <option value="16">16 px</option>
            <option value="18">18 px</option>
            <option value="20">20 px</option>
          </select>
        </div>
        <div class="setting-row">
          <label for="setting-tabsize">Tab Size</label>
          <select id="setting-tabsize" onchange="changeEditorSetting('tabSize', this.value)">
            <option value="2">2 spaces</option>
            <option value="4">4 spaces</option>
            <option value="8">8 spaces</option>
          </select>
        </div>
        <div class="setting-row">
          <label for="setting-autocomplete">Autocomplete</label>
          <select id="setting-autocomplete" onchange="changeEditorSetting('quickSuggestions', this.value)">
            <option value="true">Enable</option>
            <option value="false">Disable</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <!-- ══════ SCRIPTS ═════════════════════════════════════════════════════════ -->
  <script>
    'use strict';

    let editor = null;
    let currentTheme = 'boost';
    const API_ENDPOINT = '/api/execute';

    const JS_TEMPLATE = `// Gigni Online JavaScript Compiler
// Powered by Node.js 18 via Wandbox

const readline = require('readline');

async function main() {
  const rl = readline.createInterface({ input: process.stdin });

  // Read all stdin lines
  const lines = await new Promise(resolve => {
    const acc = [];
    rl.on('line', l => acc.push(l));
    rl.on('close', () => resolve(acc));
  });

  const name = lines[0] || 'World';
  console.log(\`Hello, \${name}! Welcome to Gigni Compiler.\`);

  // Demo: Fibonacci
  function fib(n) {
    return n <= 1 ? n : fib(n - 1) + fib(n - 2);
  }
  console.log('\\nFibonacci sequence (first 10):');
  console.log(Array.from({ length: 10 }, (_, i) => fib(i)).join(', '));
}

main();
`;

    // ─── THEME CONFIG ───
    function setTheme(mode) {
      currentTheme = mode;
      document.getElementById('body-root').className = mode;
      localStorage.setItem('gigni_compiler_theme', mode);
      if (editor) {
        const preferred = localStorage.getItem('gigni_editor_theme') || (mode === 'developer' ? 'vs-dark' : 'vs');
        monaco.editor.setTheme(preferred);
        document.getElementById('setting-theme').value = preferred;
      }
    }

    const savedTheme = localStorage.getItem('gigni_compiler_theme') || 'boost';
    setTheme(savedTheme);

    function toggleMobileMenu() {
      document.getElementById('menu-toggle').classList.toggle('active');
      document.getElementById('mobile-nav').classList.toggle('active');
    }

    function toggleSettingsModal() {
      document.getElementById('settings-modal-overlay').classList.toggle('active');
    }
    function closeSettingsModalOutside(e) {
      if (e.target.id === 'settings-modal-overlay') toggleSettingsModal();
    }

    function changeEditorSetting(key, val) {
      if (!editor) return;
      const options = {};
      if (key === 'theme') {
        monaco.editor.setTheme(val);
        localStorage.setItem('gigni_editor_theme', val);
      } else if (key === 'fontSize') {
        options.fontSize = parseInt(val);
        localStorage.setItem('gigni_editor_fontsize', val);
      } else if (key === 'tabSize') {
        editor.getModel().updateOptions({ tabSize: parseInt(val) });
        localStorage.setItem('gigni_editor_tabsize', val);
      } else if (key === 'quickSuggestions') {
        const s = val === 'true';
        options.quickSuggestions = { other: s, comments: s, strings: s };
        localStorage.setItem('gigni_editor_autocomplete', val);
      }
      editor.updateOptions(options);
    }

    function initSettingsDropdowns() {
      document.getElementById('setting-theme').value = localStorage.getItem('gigni_editor_theme') || (currentTheme === 'developer' ? 'vs-dark' : 'vs');
      document.getElementById('setting-fontsize').value = localStorage.getItem('gigni_editor_fontsize') || '14';
      document.getElementById('setting-tabsize').value = localStorage.getItem('gigni_editor_tabsize') || '2';
      document.getElementById('setting-autocomplete').value = localStorage.getItem('gigni_editor_autocomplete') || 'true';
    }

    window.MonacoEnvironment = {
      getWorkerUrl: function(moduleId, label) {
        return `data:text/javascript;charset=utf-8,${encodeURIComponent(`
          self.MonacoEnvironment = { baseUrl: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.39.0/min/' };
          importScripts('https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.39.0/min/vs/base/worker/workerMain.min.js');
        `)}`;
      }
    };
    require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.39.0/min/vs' } });
    window.addEventListener('load', function() {
      require(['vs/editor/editor.main'], () => {
      const storedTheme = localStorage.getItem('gigni_editor_theme') || (currentTheme === 'developer' ? 'vs-dark' : 'vs');
      const storedFontSize = parseInt(localStorage.getItem('gigni_editor_fontsize') || '14');
      const storedTabSize = parseInt(localStorage.getItem('gigni_editor_tabsize') || '2');
      const storedSugg = localStorage.getItem('gigni_editor_autocomplete') !== 'false';

      editor = monaco.editor.create(document.getElementById('editor-container'), {
        value: JS_TEMPLATE,
        language: 'javascript',
        theme: storedTheme,
        automaticLayout: true,
        fontSize: storedFontSize,
        fontFamily: "'Fira Code', 'Consolas', monospace",
        fontLigatures: true,
        minimap: { enabled: true },
        padding: { top: 12, bottom: 12 },
        scrollBeyondLastLine: false,
        smoothScrolling: true,
        cursorBlinking: 'smooth',
        bracketPairColorization: { enabled: true },
        quickSuggestions: { other: storedSugg, comments: storedSugg, strings: storedSugg }
      });
        editor.getModel().updateOptions({ tabSize: storedTabSize });
        initSettingsDropdowns();
      });
    });

    function formatCode() {
      if (editor) editor.getAction('editor.action.formatDocument').run();
    }

    function clearCode() {
      if (confirm('Reset editor to default template?')) editor.setValue(JS_TEMPLATE);
    }

    function downloadCode() {
      const blob = new Blob([editor.getValue()], { type: 'text/plain;charset=utf-8' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'main.js';
      a.click();
    }

    function copyCode() {
      navigator.clipboard.writeText(editor.getValue()).then(() => {
        const btn = document.getElementById('copy-btn');
        btn.textContent = '📋 Copied!';
        setTimeout(() => { btn.textContent = '📋 Copy'; }, 2000);
      });
    }

    const consoleTextDecoder = new TextDecoder('utf-8');
    function normalizeConsoleText(value) {
      if (value == null) return '';
      if (typeof value === 'string') return value;
      if (value instanceof ArrayBuffer) return consoleTextDecoder.decode(new Uint8Array(value));
      if (ArrayBuffer.isView(value)) {
        return consoleTextDecoder.decode(new Uint8Array(value.buffer, value.byteOffset, value.byteLength));
      }
      if (Array.isArray(value) && value.every(n => Number.isInteger(n) && n >= 0 && n <= 255)) {
        return consoleTextDecoder.decode(new Uint8Array(value));
      }
      return String(value);
    }

    function writeConsole(text, type = '') {
      const el = document.getElementById('terminal-stdout');
      if (el.textContent === 'Console ready. Write code and press ▶ Run.') el.textContent = '';
      el.className = type ? 'has-' + type : '';
      el.textContent += normalizeConsoleText(text);
      el.scrollTop = el.scrollHeight;
    }

    function clearConsole() {
      const el = document.getElementById('terminal-stdout');
      el.textContent = '';
      el.className = '';
    }

    async function runCode() {
      if (!editor) return;
      const code = editor.getValue();
      const stdin = document.getElementById('stdin-textarea').value;

      const runBtn = document.getElementById('run-btn');
      runBtn.disabled = true;
      runBtn.textContent = '⟳ Running...';
      document.getElementById('runtime-status').textContent = '● Executing...';
      document.getElementById('runtime-time').textContent = 'Time: Running...';
      clearConsole();

      const t0 = performance.now();
      try {
        const resp = await fetch(API_ENDPOINT, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ language: 'javascript', source_code: code, stdin })
        });
        const data = await resp.json();

        if (!resp.ok) {
          writeConsole('❌ Server error: ' + (data.error || 'Unknown error'), 'error');
          document.getElementById('runtime-status').textContent = '● Error';
          return;
        }

        if (data.compile_output && data.compile_output.trim()) {
          writeConsole('── Compilation Error ──\n' + normalizeConsoleText(data.compile_output), 'error');
          document.getElementById('runtime-status').textContent = '● Compilation Error';
        } else {
          if (data.stdout && data.stdout.trim()) writeConsole(data.stdout);
          if (data.stderr && data.stderr.trim()) writeConsole('── Runtime Error ──\n' + normalizeConsoleText(data.stderr), 'error');
          if (!data.stdout && !data.stderr) writeConsole('Program completed with exit code 0 (no output).', 'system');
          document.getElementById('runtime-status').textContent = (data.stderr && data.stderr.trim()) ? '● Runtime Error' : '● Finished';
        }
      } catch (err) {
        writeConsole('❌ Network error: ' + err.message, 'error');
        document.getElementById('runtime-status').textContent = '● Error';
      } finally {
        const elapsed = ((performance.now() - t0) / 1000).toFixed(3);
        document.getElementById('runtime-time').textContent = `Time: ${elapsed}s`;
        runBtn.disabled = false;
        runBtn.textContent = '▶ Run';
      }
    }

    document.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        e.preventDefault();
        runCode();
      }
    });
  </script>
</body>
</html>
