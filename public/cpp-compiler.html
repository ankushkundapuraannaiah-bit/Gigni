  <script>
    'use strict';
    let editor = null;
    let currentTheme = 'boost';
    const API_ENDPOINT = '/api/execute';

    const CPP_TEMPLATE = `// Gigni Online C++ Compiler
// Powered by GCC 13.2.0 via Wandbox

#include <iostream>
#include <vector>
#include <string>
#include <algorithm>
using namespace std;

int main() {
    string name;
    cout << "Enter your name: ";
    getline(cin, name);
    
    cout << "Hello, " << name << "! Welcome to Gigni C++ Compiler." << endl;

    // Demo: Sort a vector
    vector<int> nums = {64, 34, 25, 12, 22, 11, 90};
    cout << "\\nBefore sort: ";
    for (int n : nums) cout << n << " ";
    
    sort(nums.begin(), nums.end());
    cout << "\\nAfter sort:  ";
    for (int n : nums) cout << n << " ";
    cout << endl;

    return 0;
}
`;

    function setTheme(mode) {
      currentTheme = mode;
      document.getElementById('body-root').className = mode;
      localStorage.setItem('gigni_compiler_theme', mode);
      if (editor) {
        const preferred = localStorage.getItem('gigni_editor_theme') || (mode === 'developer' ? 'vs-dark' : 'vs');
        monaco.editor.setTheme(preferred);
        document.getElementById('setting-theme').value = preferred;
      }
    }
    setTheme(localStorage.getItem('gigni_compiler_theme') || 'boost');

    function toggleMobileMenu() {
      document.getElementById('menu-toggle').classList.toggle('active');
      document.getElementById('mobile-nav').classList.toggle('active');
    }
    function toggleSettingsModal() { document.getElementById('settings-modal-overlay').classList.toggle('active'); }
    function closeSettingsModalOutside(e) { if (e.target.id === 'settings-modal-overlay') toggleSettingsModal(); }

    function changeEditorSetting(key, val) {
      if (!editor) return;
      const options = {};
      if (key === 'theme') { monaco.editor.setTheme(val); localStorage.setItem('gigni_editor_theme', val); }
      else if (key === 'fontSize') { options.fontSize = parseInt(val); localStorage.setItem('gigni_editor_fontsize', val); }
      else if (key === 'tabSize') { editor.getModel().updateOptions({ tabSize: parseInt(val) }); localStorage.setItem('gigni_editor_tabsize', val); }
      else if (key === 'quickSuggestions') { const s = val === 'true'; options.quickSuggestions = { other: s, comments: s, strings: s }; localStorage.setItem('gigni_editor_autocomplete', val); }
      editor.updateOptions(options);
    }

    function initSettingsDropdowns() {
      document.getElementById('setting-theme').value = localStorage.getItem('gigni_editor_theme') || (currentTheme === 'developer' ? 'vs-dark' : 'vs');
      document.getElementById('setting-fontsize').value = localStorage.getItem('gigni_editor_fontsize') || '14';
      document.getElementById('setting-tabsize').value = localStorage.getItem('gigni_editor_tabsize') || '4';
      document.getElementById('setting-autocomplete').value = localStorage.getItem('gigni_editor_autocomplete') || 'true';
    }

    require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.39.0/min/vs' } });
    require(['vs/editor/editor.main'], () => {
      const storedTheme = localStorage.getItem('gigni_editor_theme') || (currentTheme === 'developer' ? 'vs-dark' : 'vs');
      editor = monaco.editor.create(document.getElementById('editor-container'), {
        value: CPP_TEMPLATE,
        language: 'cpp',
        theme: storedTheme,
        automaticLayout: true,
        fontSize: parseInt(localStorage.getItem('gigni_editor_fontsize') || '14'),
        fontFamily: "'Fira Code', 'Consolas', monospace",
        fontLigatures: true,
        minimap: { enabled: true },
        padding: { top: 12, bottom: 12 },
        scrollBeyondLastLine: false,
        smoothScrolling: true,
        cursorBlinking: 'smooth',
        bracketPairColorization: { enabled: true },
        quickSuggestions: { other: localStorage.getItem('gigni_editor_autocomplete') !== 'false', comments: true, strings: true }
      });
      editor.getModel().updateOptions({ tabSize: parseInt(localStorage.getItem('gigni_editor_tabsize') || '4') });
      initSettingsDropdowns();
    });

    function formatCode() { if (editor) editor.getAction('editor.action.formatDocument').run(); }
    function clearCode() { if (confirm('Reset editor to default template?')) editor.setValue(CPP_TEMPLATE); }
    function downloadCode() {
      const blob = new Blob([editor.getValue()], { type: 'text/plain;charset=utf-8' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob); a.download = 'main.cpp'; a.click();
    }
    function copyCode() {
      navigator.clipboard.writeText(editor.getValue()).then(() => {
        const btn = document.getElementById('copy-btn');
        btn.textContent = '📋 Copied!';
        setTimeout(() => { btn.textContent = '📋 Copy'; }, 2000);
      });
    }
    function writeConsole(text, type = '') {
      const el = document.getElementById('terminal-stdout');
      if (el.textContent === 'Console ready. Write code and press ▶ Run.') el.textContent = '';
      el.className = type ? 'has-' + type : '';
      el.textContent += text;
      el.scrollTop = el.scrollHeight;
    }
    function clearConsole() {
      const el = document.getElementById('terminal-stdout');
      el.textContent = ''; el.className = '';
    }

    async function runCode() {
      if (!editor) return;
      const code = editor.getValue();
      const stdin = document.getElementById('stdin-textarea').value;
      const runBtn = document.getElementById('run-btn');
      runBtn.disabled = true; runBtn.textContent = '⟳ Compiling...';
      document.getElementById('runtime-status').textContent = '● Compiling...';
      document.getElementById('runtime-time').textContent = 'Time: Running...';
      clearConsole();

      const t0 = performance.now();
      try {
        const resp = await fetch(API_ENDPOINT, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ language: 'cpp', source_code: code, stdin })
        });
        const data = await resp.json();
        if (!resp.ok) { writeConsole('❌ Server error: ' + (data.error || 'Unknown'), 'error'); document.getElementById('runtime-status').textContent = '● Error'; return; }

        const isError = data.status?.id === 6;
        const output = (data.compile_output || '') + (data.stdout || '') + (data.stderr || '');
        if (!output.trim()) { writeConsole('Program completed with no output.', 'system'); }
        else { writeConsole(output, isError ? 'error' : ''); }
        document.getElementById('runtime-status').textContent = isError ? '● Error' : '● Finished';
      } catch (err) {
        writeConsole('❌ Network error: ' + err.message, 'error');
        document.getElementById('runtime-status').textContent = '● Error';
      } finally {
        const elapsed = ((performance.now() - t0) / 1000).toFixed(3);
        document.getElementById('runtime-time').textContent = `Time: ${elapsed}s`;
        runBtn.disabled = false; runBtn.textContent = '▶ Run';
      }
    }

    document.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); runCode(); }
    });
  </script>
</body>
</html>
