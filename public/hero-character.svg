<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1600" width="1200" height="1600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#000000"/>
    </linearGradient>
    <linearGradient id="helmetGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2a2a"/>
      <stop offset="50%" style="stop-color:#0d0d0d"/>
      <stop offset="100%" style="stop-color:#050505"/>
    </linearGradient>
    <linearGradient id="visorGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b00"/>
      <stop offset="50%" style="stop-color:#ff9500"/>
      <stop offset="100%" style="stop-color:#ff6b00"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="helmetClip">
      <path d="M380,180 C380,80 480,50 600,50 C720,50 820,80 820,180 L820,650 C820,750 720,800 600,800 C480,800 380,750 380,650 Z"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="1600" fill="url(#bgGrad)"/>

  <!-- Atmospheric lighting -->
  <ellipse cx="600" cy="400" rx="500" ry="400" fill="#ff4500" opacity="0.08"/>
  <ellipse cx="900" cy="800" rx="300" ry="500" fill="#ff6b00" opacity="0.05"/>

  <!-- Character Body - Tactical Jacket -->
  <g id="body">
    <!-- Jacket base -->
    <path d="M320,750 L280,1600 L920,1600 L880,750 C850,720 650,700 600,700 C550,700 350,720 320,750" fill="#1a1a1a"/>
    
    <!-- Leather texture overlay -->
    <path d="M320,750 L280,1600 L920,1600 L880,750 C850,720 650,700 600,700 C550,700 350,720 320,750" fill="url(#helmetGrad)" opacity="0.3"/>

    <!-- Tactical straps -->
    <rect x="400" y="800" width="60" height="400" fill="#0a0a0a" rx="3"/>
    <rect x="450" y="800" width="60" height="400" fill="#0a0a0a" rx="3"/>
    <rect x="500" y="800" width="60" height="400" fill="#0a0a0a" rx="3"/>
    <rect x="550" y="800" width="60" height="400" fill="#0a0a0a" rx="3"/>
    <rect x="600" y="800" width="60" height="400" fill="#0a0a0a" rx="3"/>
    <rect x="650" y="800" width="60" height="400" fill="#0a0a0a" rx="3"/>
    <rect x="700" y="800" width="60" height="400" fill="#0a0a0a" rx="3"/>
    <rect x="750" y="800" width="60" height="400" fill="#0a0a0a" rx="3"/>

    <!-- Buckle -->
    <rect x="520" y="950" width="160" height="80" fill="#222" rx="10" stroke="#333" stroke-width="2"/>
    <rect x="560" y="970" width="80" height="40" fill="#111" rx="5"/>
    <rect x="570" y="980" width="60" height="20" fill="#333" rx="3"/>

    <!-- Collar details -->
    <path d="M420,680 L480,600 L600,580 L720,600 L780,680" fill="none" stroke="#333" stroke-width="3"/>
  </g>

  <!-- Patches -->
  <g id="patches">
    <!-- GIGNI patch - left chest -->
    <rect x="340" y="820" width="140" height="100" fill="#1a3d1a" rx="8"/>
    <rect x="345" y="825" width="130" height="90" fill="#0d2a0d" rx="6"/>
    <text x="410" y="890" font-family="Arial Black, sans-serif" font-size="42" font-weight="900" fill="#ffd700" text-anchor="middle">GIGNI</text>

    <!-- EPLO patch - right chest -->
    <rect x="720" y="780" width="80" height="50" fill="#1a1a1a" rx="4" stroke="#444" stroke-width="1"/>
    <text x="760" y="815" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">EPLO</text>

    <!-- EPLA patch -->
    <rect x="720" y="850" width="80" height="50" fill="#1a1a1a" rx="4" stroke="#444" stroke-width="1"/>
    <text x="760" y="885" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">EPLA</text>

    <!-- USB patch -->
    <rect x="720" y="920" width="80" height="50" fill="#1a1a1a" rx="4" stroke="#444" stroke-width="1"/>
    <text x="760" y="955" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">USB</text>
  </g>

  <!-- Helmet -->
  <g id="helmet" filter="url(#glow)">
    <!-- Main helmet shape -->
    <path d="M380,180 C380,80 480,50 600,50 C720,50 820,80 820,180 L820,550 C820,680 720,720 600,720 C480,720 380,680 380,550 Z" fill="url(#helmetGrad)"/>

    <!-- Helmet glossy highlight -->
    <path d="M420,120 C420,80 480,60 600,55 C720,60 780,80 780,120 L780,350 C780,380 720,400 600,400 C480,400 420,380 420,350 Z" fill="#333" opacity="0.5"/>

    <!-- Visor opening -->
    <ellipse cx="600" cy="350" rx="180" ry="120" fill="#111"/>
    
    <!-- Glowing visor ring -->
    <ellipse cx="600" cy="350" rx="170" ry="110" fill="none" stroke="url(#visorGrad)" stroke-width="8" filter="url(#strongGlow)" opacity="0.9"/>
    
    <!-- Inner visor glow -->
    <ellipse cx="600" cy="350" rx="150" ry="90" fill="#ff6b00" opacity="0.15" filter="url(#strongGlow)"/>

    <!-- Visor reflection lines -->
    <path d="M450,300 L480,280 L520,290 L560,285 L600,295" fill="none" stroke="#ff9500" stroke-width="2" opacity="0.6"/>
    <path d="M520,340 L560,330 L620,335" fill="none" stroke="#ff9500" stroke-width="1" opacity="0.4"/>

    <!-- Ear sections -->
    <rect x="360" y="380" width="40" height="120" rx="10" fill="#111"/>
    <rect x="800" y="380" width="40" height="120" rx="10" fill="#111"/>
    
    <!-- Ear glow lights -->
    <rect x="365" y="400" width="30" height="30" rx="5" fill="#ff6b00" filter="url(#strongGlow)"/>
    <rect x="365" y="450" width="30" height="30" rx="5" fill="#ff6b00" filter="url(#strongGlow)"/>
    <rect x="805" y="400" width="30" height="30" rx="5" fill="#ff6b00" filter="url(#strongGlow)"/>
    <rect x="805" y="450" width="30" height="30" rx="5" fill="#ff6b00" filter="url(#strongGlow)"/>

    <!-- Comm antenna -->
    <line x1="820" y1="400" x2="870" y2="350" stroke="#333" stroke-width="4"/>
    <circle cx="875" cy="345" r="8" fill="#ff6b00" filter="url(#glow)"/>

    <!-- Chin guard -->
    <path d="M480,580 C480,620 520,660 600,670 C680,660 720,620 720,580 L720,540 L480,540 Z" fill="#0a0a0a"/>
    <path d="M500,550 L700,550 L720,580 C720,620 680,660 600,670 C520,660 480,620 480,580 Z" fill="#1a1a1a" opacity="0.5"/>

    <!-- Helmet seam details -->
    <path d="M600,50 L600,400" stroke="#222" stroke-width="1" opacity="0.5"/>
    <path d="M450,150 L450,500" stroke="#222" stroke-width="1" opacity="0.3"/>
    <path d="M750,150 L750,500" stroke="#222" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- Rim lighting effect -->
  <g id="rimLight" opacity="0.4">
    <path d="M380,180 C380,80 480,50 600,50 C720,50 820,80 820,180" fill="none" stroke="#ff6b00" stroke-width="20" filter="url(#strongGlow)"/>
  </g>

  <!-- Ambient particles -->
  <circle cx="200" cy="300" r="2" fill="#ff6b00" opacity="0.5"/>
  <circle cx="1000" cy="500" r="3" fill="#ff6b00" opacity="0.3"/>
  <circle cx="300" cy="1000" r="2" fill="#ff6b00" opacity="0.4"/>
  <circle cx="900" cy="1200" r="2" fill="#ff6b00" opacity="0.3"/>
  <circle cx="150" cy="800" r="1" fill="#fff" opacity="0.3"/>
  <circle cx="1050" cy="700" r="1" fill="#fff" opacity="0.2"/>

  <!-- Ground reflection -->
  <ellipse cx="600" cy="1550" rx="400" ry="50" fill="#ff6b00" opacity="0.1"/>
</svg>