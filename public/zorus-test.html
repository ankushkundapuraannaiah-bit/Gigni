  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
  
  <style>
    :root {
      --ink: #12062a;
      --muted: #6b7280;
      --purple: #7c3aed;
      --purple-2: #9333ea;
      --purple-3: #a855f7;
      --purple-soft: #f5f0ff;
      --purple-mid: #ede9fe;
      --white: #ffffff;
      --border: rgba(124,58,237,0.15);
      --line: rgba(124,58,237,0.10);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Outfit', sans-serif;
      color: var(--ink);
      background: #ffffff;
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #bg-canvas {
      position: fixed;
      inset: 0;
      z-index: -2;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 100vh;
      z-index: -1;
      background-image: radial-gradient(circle, rgba(124,58,237,0.11) 1px, transparent 1px);
      background-size: 36px 36px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.4), transparent 70%);
      pointer-events: none;
    }

    .main-container {
      position: relative;
      z-index: 10;
      padding: 140px 24px 80px;
      max-width: 800px;
      margin: 0 auto;
      width: 100%;
      flex-grow: 1;
    }

    /* ── NAVBAR ── */
    nav {
      position: fixed;
      top: 16px; left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      width: min(1180px, calc(100% - 32px));
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 10px 16px 10px 24px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(22px);
      box-shadow: 0 12px 40px rgba(124,58,237,0.10), 0 0 0 1px rgba(255,255,255,0.6) inset;
    }

    .logo {
      font-size: 24px; font-weight: 900; letter-spacing: 0.04em;
      background: linear-gradient(135deg, var(--purple), var(--purple-2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      filter: drop-shadow(0 0 18px rgba(192,38,211,0.35));
      text-decoration: none;
    }

    .timer-pill {
      background: var(--purple-soft);
      border: 1px solid var(--border);
      padding: 8px 20px;
      border-radius: 50px;
      font-weight: 800;
      font-size: 16px;
      color: var(--purple);
      box-shadow: 0 4px 12px rgba(124, 58, 237, 0.08);
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .timer-pill.warning {
      background: #fef2f2;
      border-color: #f87171;
      color: #ef4444;
      animation: pulse 1s infinite alternate;
      box-shadow: 0 4px 12px rgba(239, 68, 68, 0.15);
    }
    @keyframes pulse { from { opacity: 0.7; transform: scale(0.98); } to { opacity: 1; transform: scale(1.02); } }

    /* ── HEADER ── */
    .test-header {
      text-align: center;
      margin-bottom: 50px;
    }
    .test-header h1 {
      font-size: clamp(2.2rem, 5vw, 3.2rem);
      font-weight: 900;
      color: var(--ink);
      line-height: 1.1;
      margin-bottom: 12px;
      letter-spacing: -0.02em;
    }
    .test-header h1 span {
      background: linear-gradient(135deg, var(--purple), var(--purple-3));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .test-header p {
      color: var(--muted);
      font-size: 16px;
      font-weight: 500;
    }

    /* ── QUESTION CARD ── */
    .question-card {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 32px;
      margin-bottom: 24px;
      box-shadow: 0 10px 30px rgba(124,58,237,0.04);
      transition: all 0.3s ease;
    }
    .question-card:hover {
      border-color: var(--purple-3);
      box-shadow: 0 15px 40px rgba(124,58,237,0.08);
      transform: translateY(-2px);
    }
    .q-meta {
      font-size: 12px;
      font-weight: 800;
      color: var(--purple);
      text-transform: uppercase;
      margin-bottom: 12px;
      letter-spacing: 0.05em;
    }
    .q-text {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 24px;
      line-height: 1.45;
      color: var(--ink);
    }

    /* ── OPTIONS ── */
    .option-label {
      display: flex;
      align-items: center;
      padding: 16px 20px;
      background: rgba(124,58,237,0.02);
      border: 1px solid var(--border);
      border-radius: 16px;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-bottom: 12px;
      font-weight: 600;
      color: var(--ink);
    }
    .option-label:hover {
      background: var(--purple-soft);
      border-color: var(--purple);
    }
    .option-label input {
      margin-right: 16px;
      accent-color: var(--purple);
      width: 18px;
      height: 18px;
      cursor: pointer;
    }
    .option-label.selected {
      background: var(--purple-soft);
      border-color: var(--purple);
      box-shadow: 0 0 0 1px var(--purple);
    }

    /* ── SUBMIT BUTTON ── */
    .submit-btn {
      width: 100%;
      padding: 20px;
      background: linear-gradient(135deg, var(--purple), var(--purple-2));
      color: #ffffff;
      border: none;
      border-radius: 100px;
      font-weight: 800;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 24px;
      box-shadow: 0 10px 30px rgba(124,58,237,0.25);
    }
    .submit-btn:hover {
      transform: translateY(-4px);
      box-shadow: 0 15px 40px rgba(124,58,237,0.4);
    }

    /* ── MODAL ── */
    .modal-ovl {
      position: fixed;
      inset: 0;
      background: rgba(18, 6, 42, 0.4);
      backdrop-filter: blur(25px);
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .modal-ovl.active {
      opacity: 1;
      pointer-events: all;
    }
    .modal {
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 32px;
      padding: 50px 40px;
      text-align: center;
      max-width: 480px;
      width: calc(100% - 32px);
      box-shadow: 0 30px 70px rgba(124,58,237,0.18);
      transform: scale(0.9);
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .modal-ovl.active .modal {
      transform: scale(1);
    }
    
    .modal h2 {
      font-size: 2.2rem;
      font-weight: 900;
      margin-bottom: 16px;
      color: var(--ink);
    }
    
    .modal-score {
      font-size: 4.5rem;
      font-weight: 900;
      background: linear-gradient(135deg, var(--purple), var(--purple-3));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 16px;
      letter-spacing: -0.03em;
    }

    .modal-desc {
      color: var(--muted);
      margin-bottom: 36px;
      line-height: 1.6;
      font-size: 16px;
      font-weight: 500;
    }

    .modal-btn {
      display: inline-block;
      background: linear-gradient(135deg, var(--purple), var(--purple-2));
      color: #fff;
      padding: 16px 40px;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 800;
      font-size: 16px;
      box-shadow: 0 10px 25px rgba(124,58,237,0.25);
      transition: all 0.3s ease;
    }
    .modal-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 32px rgba(124,58,237,0.35);
    }

    footer {
      padding: 40px;
      text-align: center;
      opacity: 0.5;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      border-top: 1px solid var(--border);
      width: 100%;
      margin-top: auto;
    }
  </style>
  <script defer src="/_vercel/speed-insights/script.js"></script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6473053429465010" crossorigin="anonymous"></script>
</head>
<body>

  <canvas id="bg-canvas"></canvas>

  <nav>
    <a href="/" class="logo">GIGNI</a>
    <div class="timer-pill" id="time-display">50:00</div>
  </nav>

  <div class="main-container">
    <div class="test-header">
      <h1>Technical <span>Assessment</span></h1>
      <p>Zorus 2.1 Python Specialization Selection</p>
    </div>

    <form id="quiz-form">
      <div id="questions-container"></div>
      <button type="submit" class="submit-btn" id="submit-btn">Finalize Submission</button>
    </form>
  </div>

  <div class="modal-ovl" id="result-modal">
    <div class="modal">
      <h2 id="modal-title">Assessment Synced</h2>
      <div id="score-text" class="modal-score">0%</div>
      <p id="modal-desc" class="modal-desc">Your scores have been synced with your agent identity.</p>
      <a href="/dashboard" class="modal-btn">Back to Dashboard</a>
    </div>
  </div>

  <footer>
    &copy; 2026 GIGNI · ZORUS 2.1 AGENTIC COHORT. All rights reserved.
  </footer>
  <script>
    const questions = [
      {q: "Which library is primary for numerical arrays in Python?", options: ["Pandas", "NumPy", "Flask"], ans: 1},
      {q: "What keyword is used to start a function definition in Python?", options: ["func", "def", "lambda"], ans: 1},
      {q: "Which type of machine learning uses labeled data for training?", options: ["Supervised", "Unsupervised", "Reinforcement"], ans: 0},
      {q: "What does API stand for in software and integration context?", options: ["Agent Programming Interface", "Application Programming Interface", "Advanced Personal Identity"], ans: 1},
      {q: "Which extension is standard for Python source files?", options: [".py", ".pyc", ".ipynb"], ans: 0},
      {q: "In Python, which mechanism is used to handle exceptions gracefully?", options: ["try-except blocks", "do-catch statements", "throw-rescue routines"], ans: 0},
      {q: "Which decorator is used to define a method that belongs to the class itself rather than instances?", options: ["@staticmethod", "@classmethod", "@property"], ans: 1},
      {q: "Which Python keyword is used to yield values one by one from a generator?", options: ["return", "send", "yield"], ans: 2},
      {q: "A cosine similarity score of 1.0 between two embedding vectors indicates:", options: ["Opposite semantic direction", "Orthogonal/independent concepts", "Identical semantic direction"], ans: 2},
      {q: "In prompt engineering, what is the 'Few-Shot' prompting technique?", options: ["Prompting with example inputs and outputs", "Prompting multiple models concurrently", "Using very short, single-word prompts"], ans: 0},
      {q: "What is the main goal of the ReAct (Reasoning and Acting) framework in AI agents?", options: ["Standardize react.js component renders", "Combine reasoning thoughts and tool actions sequentially", "Minimize LLM API usage cost"], ans: 1},
      {q: "What does RAG stand for in the context of LLM integration systems?", options: ["Retrieval-Augmented Generation", "Random Agentic Gateway", "Recurrent Analytical Generator"], ans: 0},
      {q: "Which index structure in vector databases is highly optimized for fast approximate nearest neighbor (ANN) searches?", options: ["B-Tree", "HNSW (Hierarchical Navigable Small World)", "Hash Map"], ans: 1},
      {q: "What is an HTTP Webhook primarily used for?", options: ["Serving static files to a web browser", "Real-time asynchronous data delivery from a source server to a listener URL", "Encrypting local database passwords"], ans: 1},
      {q: "In n8n visual automation workflows, what does a Webhook Node do?", options: ["Listens for incoming HTTP requests to trigger a workflow", "Directly manages physical server backups", "Edits CSS styling sheets in real-time"], ans: 0},
      {q: "In voice cloning, what does 'zero-shot voice cloning' mean?", options: ["Cloning a voice with zero source audio samples", "Cloning a voice using a very short audio prompt without training on the user's voice", "A voice clone that has zero emotional resonance"], ans: 1},
      {q: "What is HeyGen primarily used for in modern AI application pipelines?", options: ["Training large foundation language models", "Compiling local Python packages", "Synthesizing high-fidelity realistic talking AI avatars"], ans: 2},
      {q: "Which HTTP header is typically used to transmit a Bearer Token for API authentication?", options: ["Authorization", "Authentication", "X-Token-Security"], ans: 0},
      {q: "What is the default port for local development in standard Node/Express and local Vercel deployments?", options: ["80", "8080", "3000"], ans: 2},
      {q: "In Python's multiprocessing module, how does it differ from threading?", options: ["Concurrency is simulated and shared", "Bypasses the Global Interpreter Lock (GIL) by running tasks in separate processes", "Consumes significantly less memory"], ans: 1},
      {q: "What does the 'temperature' parameter control during LLM model inference?", options: ["Model compute and latency times", "The creativity, random spread, or deterministic nature of the outputs", "The maximum token context window size"], ans: 1},
      {q: "Which agent memory mechanism preserves a rolling window of the last N conversation exchanges?", options: ["Vector Database memory", "ConversationBufferMemory", "ConversationBufferWindowMemory"], ans: 2},
      {q: "In Git version control, which command saves modified workspace files without creating a commit?", options: ["git push", "git stash", "git status"], ans: 1},
      {q: "What is the primary underlying framework that powers the n8n automation runtime engine?", options: ["Python", "Node.js / TypeScript", "GoLang"], ans: 1},
      {q: "How do you create an isolated environment in Python to prevent package version conflicts?", options: ["Run 'pip install --upgrade'", "Use 'venv' or 'virtualenv' modules", "Add configurations directly to system environment variables"], ans: 1}
    ];

    const container = document.getElementById('questions-container');
    questions.forEach((q, i) => {
      const card = document.createElement('div');
      card.className = 'question-card';
      card.innerHTML = `
        <div class="q-meta">Logic Segment ${i+1}</div>
        <div class="q-text">${q.q}</div>
        <div class="options">
          ${q.options.map((opt, oi) => `
            <label class="option-label" onclick="selectOption(this, ${i})">
              <input type="radio" name="q${i}" value="${oi}">
              <span>${opt}</span>
            </label>
          `).join('')}
        </div>
      `;
      container.appendChild(card);
    });

    function selectOption(labelElement, qIndex) {
      const parentOptions = labelElement.parentNode;
      parentOptions.querySelectorAll('.option-label').forEach(l => l.classList.remove('selected'));
      labelElement.classList.add('selected');
      const radio = labelElement.querySelector('input');
      if (radio) radio.checked = true;
    }

    let timeLeft = 50 * 60;
    const timer = setInterval(() => {
      timeLeft--;
      if(timeLeft <= 0) { clearInterval(timer); submit(); }
      const m = Math.floor(timeLeft/60), s = timeLeft%60;
      document.getElementById('time-display').innerText = `${m}:${s < 10 ? '0'+s : s}`;
      if (timeLeft <= 5 * 60) {
        document.getElementById('time-display').classList.add('warning');
      }
    }, 1000);

    document.getElementById('quiz-form').onsubmit = e => { 
      e.preventDefault(); 
      if(confirm('Submit assessment?')) submit(); 
    };

    async function submit() {
      clearInterval(timer);
      let score = 0;
      questions.forEach((q, i) => {
        const sel = document.querySelector(`input[name="q${i}"]:checked`);
        if(sel && parseInt(sel.value) === q.ans) score++;
      });
      const pct = Math.round((score/questions.length)*100);
      const user = JSON.parse(localStorage.getItem('gigni_user') || '{}');
      const token = user.token || localStorage.getItem('gigni_token') || '';
      if(user.id) {
          try {
              await fetch('/api/zorus-submit-score', { 
                  method:'POST', 
                  headers:{
                      'Content-Type':'application/json',
                      'Authorization': `Bearer ${token}`
                  }, 
                  body:JSON.stringify({userId:user.id, score:pct}) 
              });
          } catch(e) {
              console.error("Submission sync failed", e);
          }
      }
      
      document.getElementById('score-text').innerText = pct + '%';
      document.getElementById('modal-title').innerText = pct >= 85 ? 'Selection Qualified' : 'Sync Complete';
      document.getElementById('modal-desc').innerText = pct >= 85 
        ? 'Congratulations! You have qualified for the Zorus 2.1 cohort selection.' 
        : 'Your score has been processed and synced with your agent identity.';
      document.getElementById('result-modal').classList.add('active');
    }

    // 3D Background
    const canvas = document.getElementById('bg-canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.z = 5;
    const pGeo = new THREE.BufferGeometry();
    const pPos = new Float32Array(500 * 3);
    for(let i=0; i<1500; i++) pPos[i] = (Math.random() - 0.5) * 15;
    pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
    const points = new THREE.Points(pGeo, new THREE.PointsMaterial({ size: 0.02, color: 0x7c3aed, transparent: true, opacity: 0.45 }));
    scene.add(points);
    
    function animate() { 
      requestAnimationFrame(animate); 
      points.rotation.y += 0.0005; 
      points.rotation.x += 0.0002; 
      renderer.render(scene, camera); 
    }
    animate();

    window.addEventListener('resize', () => { 
      renderer.setSize(window.innerWidth, window.innerHeight); 
      camera.aspect = window.innerWidth/window.innerHeight; 
      camera.updateProjectionMatrix(); 
    });
  </script>
</body>
