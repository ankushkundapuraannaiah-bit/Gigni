<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zorus 2.1 — Technical Assessment</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Bebas+Neue&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
  <style>
    :root {
      --primary: #3b5bdb;
      --orange: #f97316;
      --bg: #030712;
      --card-bg: rgba(17, 24, 39, 0.4);
      --border: rgba(255, 255, 255, 0.08);
      --text: #f3f4f6;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      overflow-x: hidden;
    }

    #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: 0.3; pointer-events: none; }
    .main-container { position: relative; z-index: 10; padding-top: 100px; max-width: 800px; margin: 0 auto; }

    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      padding: 15px 40px; background: rgba(3, 7, 18, 0.8);
      backdrop-filter: blur(20px);
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .logo { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: #fff; text-decoration: none; }
    
    .timer-pill {
      background: rgba(249, 115, 22, 0.1); border: 1px solid var(--orange);
      padding: 8px 20px; border-radius: 50px; font-weight: 800; font-size: 16px; color: var(--orange);
    }
    .timer-pill.warning { background: rgba(220, 38, 38, 0.2); border-color: #dc2626; color: #fca5a5; animation: pulse 1s infinite alternate; }
    @keyframes pulse { from { opacity: 0.6; } to { opacity: 1; } }

    .test-header { text-align: center; margin-bottom: 60px; }
    .test-header h1 { font-family: 'Bebas Neue', sans-serif; font-size: 3.5rem; margin-bottom: 12px; }

    .question-card {
      background: var(--card-bg); backdrop-filter: blur(20px); border: 1px solid var(--border);
      border-radius: 24px; padding: 32px; margin-bottom: 24px; transition: 0.3s;
    }
    .question-card:hover { border-color: var(--primary); }
    .q-meta { font-size: 12px; font-weight: 700; color: var(--primary); text-transform: uppercase; margin-bottom: 12px; }
    .q-text { font-size: 1.25rem; font-weight: 600; margin-bottom: 24px; line-height: 1.5; }

    .option-label {
      display: flex; align-items: center; padding: 16px 20px;
      background: rgba(255,255,255,0.03); border: 1px solid var(--border);
      border-radius: 12px; cursor: pointer; transition: 0.2s; margin-bottom: 12px;
    }
    .option-label:hover { background: rgba(255,255,255,0.07); }
    .option-label input { margin-right: 16px; accent-color: var(--orange); }
    .option-label.selected { background: rgba(249, 115, 22, 0.1); border-color: var(--orange); }

    .submit-btn {
      width: 100%; padding: 20px; background: #fff; color: #000; border: none; border-radius: 100px;
      font-weight: 800; font-size: 18px; cursor: pointer; transition: 0.3s; margin-top: 40px;
    }
    .submit-btn:hover { background: var(--primary); color: #fff; transform: translateY(-4px); }

    .modal-ovl {
      position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px);
      z-index: 2000; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: 0.3s;
    }
    .modal-ovl.active { opacity: 1; pointer-events: all; }
    .modal { background: #0d1117; border: 1px solid var(--border); border-radius: 32px; padding: 60px; text-align: center; max-width: 450px; }
  </style>
<script defer src="/_vercel/speed-insights/script.js"></script>
</head>
<body>

  <canvas id="bg-canvas"></canvas>

  <nav>
    <a href="index.html" class="logo">GIGNI</a>
    <div class="timer-pill" id="time-display">50:00</div>
  </nav>

  <div class="main-container">
    <div class="test-header">
      <h1>Technical Assessment</h1>
      <p style="opacity:0.5;">Zorus 2.1 Python Specialization Selection</p>
    </div>

    <form id="quiz-form">
      <div id="questions-container"></div>
      <button type="submit" class="submit-btn" id="submit-btn">Finalize Submission</button>
    </form>
  </div>

  <div class="modal-ovl" id="result-modal">
    <div class="modal">
      <h2 id="modal-title" style="font-family:'Bebas Neue'; font-size:3rem; margin-bottom:20px;">Assessment Synced</h2>
      <div id="score-text" style="font-size:4rem; font-weight:900; color:var(--orange); margin-bottom:20px;">0%</div>
      <p id="modal-desc" style="opacity:0.6; margin-bottom:40px; line-height:1.6;">Your scores have been synced with your agent identity.</p>
      <a href="dashboard.html" style="background:var(--primary); color:#fff; padding:15px 40px; border-radius:50px; text-decoration:none; font-weight:700;">Back to Dashboard</a>
    </div>
  </div>

  <script>
    const questions = [
      {q: "Which library is primary for numerical arrays in Python?", options: ["Pandas", "NumPy", "Flask"], ans: 1},
      {q: "What keyword is used to start a function definition?", options: ["func", "def", "lambda"], ans: 1},
      {q: "Which type of learning uses labeled data?", options: ["Supervised", "Unsupervised", "Reinforcement"], ans: 0},
      {q: "What does API stand for?", options: ["Agent Programming Interface", "Application Programming Interface", "Advanced Personal Identity"], ans: 1},
      {q: "Which extension is used for Python source files?", options: [".py", ".pyc", ".ipynb"], ans: 0}
    ]; // Reduced for brevity in demo, keep full logic

    const container = document.getElementById('questions-container');
    questions.forEach((q, i) => {
      const card = document.createElement('div');
      card.className = 'question-card';
      card.innerHTML = `
        <div class="q-meta">Logic Segment ${i+1}</div>
        <div class="q-text">${q.q}</div>
        <div class="options">
          ${q.options.map((opt, oi) => `
            <label class="option-label" onclick="this.parentNode.querySelectorAll('label').forEach(l=>l.classList.remove('selected')); this.classList.add('selected');">
              <input type="radio" name="q${i}" value="${oi}">
              <span>${opt}</span>
            </label>
          `).join('')}
        </div>
      `;
      container.appendChild(card);
    });

    let timeLeft = 50 * 60;
    const timer = setInterval(() => {
      timeLeft--;
      if(timeLeft <= 0) { clearInterval(timer); submit(); }
      const m = Math.floor(timeLeft/60), s = timeLeft%60;
      document.getElementById('time-display').innerText = `${m}:${s < 10 ? '0'+s : s}`;
    }, 1000);

    document.getElementById('quiz-form').onsubmit = e => { e.preventDefault(); if(confirm('Submit assessment?')) submit(); };

    async function submit() {
      clearInterval(timer);
      let score = 0;
      questions.forEach((q, i) => {
        const sel = document.querySelector(`input[name="q${i}"]:checked`);
        if(sel && parseInt(sel.value) === q.ans) score++;
      });
      const pct = Math.round((score/questions.length)*100);
      const user = JSON.parse(localStorage.getItem('gigni_user') || '{}');
      if(user.id) await fetch('/api/zorus-submit-score', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({userId:user.id, score:pct}) });
      
      document.getElementById('score-text').innerText = pct + '%';
      document.getElementById('modal-title').innerText = pct >= 85 ? 'Selection Qualified' : 'Sync Complete';
      document.getElementById('result-modal').classList.add('active');
    }

    // 3D BG
    const canvas = document.getElementById('bg-canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.z = 5;
    const pGeo = new THREE.BufferGeometry();
    const pPos = new Float32Array(500 * 3);
    for(let i=0; i<1500; i++) pPos[i] = (Math.random() - 0.5) * 15;
    pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
    const points = new THREE.Points(pGeo, new THREE.PointsMaterial({ size: 0.03, color: 0x3b5bdb, transparent: true, opacity: 0.5 }));
    scene.add(points);
    function animate() { requestAnimationFrame(animate); points.rotation.y += 0.0005; renderer.render(scene, camera); }
    animate();
  </script>
</body>
</html>
