    const JS_TEMPLATE = `// Gigni JavaScript Pane
const gradients = [
  'linear-gradient(135deg, #667eea, #764ba2)',
  'linear-gradient(135deg, #f093fb, #f5576c)',
  'linear-gradient(135deg, #4facfe, #00f2fe)',

  'linear-gradient(135deg, #fa709a, #fee140)',
  'linear-gradient(135deg, #a18cd1, #fbc2eb)',

    function setTheme(mode) {
      currentTheme = mode;
      document.getElementById('body-root').className = mode;
      localStorage.setItem('gigni_compiler_theme', mode);
      const preferred = localStorage.getItem('gigni_editor_theme') || (mode === 'developer' ? 'vs-dark' : 'vs');
      if (htmlEditor) monaco.editor.setTheme(preferred);
    }
    setTheme(localStorage.getItem('gigni_compiler_theme') || 'boost');

    function toggleMobileMenu() { document.getElementById('menu-toggle').classList.toggle('active'); document.getElementById('mobile-nav').classList.toggle('active'); }

    function runPreview() {
      const html = htmlEditor ? htmlEditor.getValue() : '';
      const css = cssEditor ? cssEditor.getValue() : '';
      const js = jsEditor ? jsEditor.getValue() : '';

      // Build combined document
      let doc = html;
      // Inject CSS before </head>
      const cssTag = `<style>\n${css}\n</style>`;
      const jsTag = `<script>\n${js}\n<\/script>`;

      if (doc.includes('</head>')) {
        doc = doc.replace('</head>', cssTag + '\n</head>');
      } else {
        doc = cssTag + '\n' + doc;
      }
      if (doc.includes('</body>')) {
        doc = doc.replace('</body>', jsTag + '\n</body>');
      } else {
        doc += '\n' + jsTag;
      }

      const frame = document.getElementById('preview-frame');
      const placeholder = document.getElementById('preview-placeholder');
      frame.style.display = 'block';
      placeholder.style.display = 'none';
      frame.srcdoc = doc;
      hasRunOnce = true;
    }

    function openInNewTab() {
      const html = htmlEditor ? htmlEditor.getValue() : '';
      const css = cssEditor ? cssEditor.getValue() : '';
      const js = jsEditor ? jsEditor.getValue() : '';
      let doc = html;
      const cssTag = `<style>\n${css}\n</style>`;
      const jsTag = `<script>\n${js}\n<\/script>`;
      if (doc.includes('</head>')) doc = doc.replace('</head>', cssTag + '\n</head>');
      else doc = cssTag + '\n' + doc;
      if (doc.includes('</body>')) doc = doc.replace('</body>', jsTag + '\n</body>');
      else doc += '\n' + jsTag;
      const blob = new Blob([doc], { type: 'text/html' });
      window.open(URL.createObjectURL(blob), '_blank');
    }

    function resetAll() {
      if (confirm('Reset all panes to default templates?')) {
        htmlEditor && htmlEditor.setValue(HTML_TEMPLATE);
        cssEditor && cssEditor.setValue(CSS_TEMPLATE);
        jsEditor && jsEditor.setValue(JS_TEMPLATE);
        runPreview();
      }
    }

    function downloadAll() {
      const html = htmlEditor ? htmlEditor.getValue() : '';
      const css = cssEditor ? cssEditor.getValue() : '';
      const js = jsEditor ? jsEditor.getValue() : '';
      let doc = html;
      const cssTag = `<style>\n${css}\n</style>`;
      const jsTag = `<script>\n${js}\n<\/script>`;
      if (doc.includes('</head>')) doc = doc.replace('</head>', cssTag + '\n</head>');
      else doc = cssTag + '\n' + doc;
      if (doc.includes('</body>')) doc = doc.replace('</body>', jsTag + '\n</body>');
      else doc += '\n' + jsTag;
      const blob = new Blob([doc], { type: 'text/html' });
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'index.html'; a.click();
    }

    function copyPane(pane) {
      const val = pane === 'css' ? (cssEditor && cssEditor.getValue()) : (jsEditor && jsEditor.getValue());
      if (val) navigator.clipboard.writeText(val).then(() => alert('Copied to clipboard!'));
    }

    let autoRunEnabled = true;
    function toggleAutoRun() {
      autoRunEnabled = !autoRunEnabled;
      document.getElementById('autorun-btn').textContent = autoRunEnabled ? '🔄 Auto: ON' : '⏸ Auto: OFF';
    }

    function scheduleAutoRun() {
      if (!autoRunEnabled) return;
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(runPreview, 800);
    }

    window.MonacoEnvironment = {
      getWorkerUrl: function(moduleId, label) {
        return `data:text/javascript;charset=utf-8,${encodeURIComponent(`
          self.MonacoEnvironment = { baseUrl: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.39.0/min/' };
          importScripts('https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.39.0/min/vs/base/worker/workerMain.min.js');
        `)}`;
      }
    };
    require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.39.0/min/vs' } });
    require(['vs/editor/editor.main'], () => {
      const storedTheme = localStorage.getItem('gigni_editor_theme') || (currentTheme === 'developer' ? 'vs-dark' : 'vs');
      const sharedOpts = {
        theme: storedTheme,
        automaticLayout: true,
        fontSize: 13,
        fontFamily: "'Fira Code', 'Consolas', monospace",
        fontLigatures: true,
        minimap: { enabled: false },
        padding: { top: 10, bottom: 10 },
        scrollBeyondLastLine: false,
        smoothScrolling: true,
        cursorBlinking: 'smooth',
        lineNumbers: 'on',
        wordWrap: 'on'
      };

      htmlEditor = monaco.editor.create(document.getElementById('html-editor'), {
        ...sharedOpts, value: HTML_TEMPLATE, language: 'html'
      });
      cssEditor = monaco.editor.create(document.getElementById('css-editor'), {
        ...sharedOpts, value: CSS_TEMPLATE, language: 'css'
      });

      // JS editor needs to be injected into the DOM since we couldn't add it via HTML in the 2-col grid
      // We'll add a third row for the JS editor
      const jsPanel = document.createElement('div');
      jsPanel.className = 'panel';
      jsPanel.style.gridColumn = '1';
      jsPanel.innerHTML = `
        <div class="control-header">
          <div class="lang-badge">
            <span class="lang-dot js"></span>
            JavaScript
          </div>
          <div class="toolbar-group">
            <button class="btn-action" onclick="copyPane('js')">📋 Copy</button>
          </div>
        </div>
        <div class="editor-container" id="js-editor"></div>
      `;
      document.querySelector('.workspace').appendChild(jsPanel);

      // Update grid to 3 rows in the left col
      const workspace = document.querySelector('.workspace');
      workspace.style.gridTemplateRows = '1fr 1fr 1fr';

      jsEditor = monaco.editor.create(document.getElementById('js-editor'), {
        ...sharedOpts, value: JS_TEMPLATE, language: 'javascript'
      });

      // Wire auto-run
      htmlEditor.onDidChangeModelContent(scheduleAutoRun);
      cssEditor.onDidChangeModelContent(scheduleAutoRun);
      jsEditor.onDidChangeModelContent(scheduleAutoRun);

      // Run on load
      setTimeout(runPreview, 500);
    });

    document.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); runPreview(); }
      if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'R') { e.preventDefault(); toggleAutoRun(); }
    });
  </script>
</body>
</html>
