    .menu-toggle { display: none; background: none; border: none; cursor: pointer; padding: 8px; z-index: 2001; }
    .hamburger { display: block; width: 22px; height: 2px; background: var(--purple); position: relative; transition: 0.3s; }
    .hamburger::before, .hamburger::after { content: ''; position: absolute; width: 100%; height: 100%; background: var(--purple); transition: 0.3s; }
    .hamburger::before { top: -6px; left: 0; }
    .hamburger::after { bottom: -6px; left: 0; }
    .menu-toggle.active .hamburger { background: transparent; }
    .menu-toggle.active .hamburger::before { transform: rotate(45deg); top: 0; }
    .menu-toggle.active .hamburger::after { transform: rotate(-45deg); bottom: 0; }

    @media (min-width: 992px) {

      <div class="modal-body">
        <div class="setting-row">
          <label for="setting-theme">Editor Theme</label>
          <select id="setting-theme" onchange="changeEditorSetting('theme', this.value)">
            <option value="vs">Light (vs)</option>
            <option value="vs-dark">Dark (vs-dark)</option>
            <option value="hc-black">High Contrast</option>
          </select>
        </div>
        <div class="setting-row">
          <label for="setting-fontsize">Font Size</label>
          <select id="setting-fontsize" onchange="changeEditorSetting('fontSize', this.value)">
            <option value="12">12 px</option>
            <option value="14">14 px</option>
            <option value="16">16 px</option>
            <option value="18">18 px</option>
            <option value="20">20 px</option>
          </select>
        </div>
        <div class="setting-row">
          <label for="setting-tabsize">Tab Size</label>
          <select id="setting-tabsize" onchange="changeEditorSetting('tabSize', this.value)">
            <option value="2">2 spaces</option>
            <option value="4">4 spaces</option>
            <option value="8">8 spaces</option>
          </select>
        </div>
        <div class="setting-row">
          <label for="setting-autocomplete">Autocomplete</label>
          <select id="setting-autocomplete" onchange="changeEditorSetting('quickSuggestions', this.value)">
            <option value="true">Enable</option>
            <option value="false">Disable</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <!-- ══════ SCRIPTS ═════════════════════════════════════════════════════════ -->
  <script>
    'use strict';

    let editor = null;
    let pyodideInstance = null;
    let isPyodideLoading = false;
    let currentTheme = 'boost';
    window.currentLang = 'python';

    const PYTHON_TEMPLATE = `# Gigni Online Python Compiler — Pyodide WASM Runtime
# Tip: Enter stdin values in the left panel before running.

def greet(name):
    print(f"Hello, {name}! Welcome to Gigni Python Compiler.")

# Demonstrate stdin reading with a graceful fallback
import sys
stdin_data = sys.stdin.read().strip()
name = stdin_data if stdin_data else "Developer"

greet(name)

# List comprehension demo
numbers = [1, 2, 3, 4, 5]
print("\\nNumbers:", numbers)
print("Squares:", [x**2 for x in numbers])
`;

    // ─── THEME CONFIG ───
    function setTheme(mode) {
      currentTheme = mode;
      document.getElementById('body-root').className = mode;
      localStorage.setItem('gigni_compiler_theme', mode);

      if (editor) {
        const preferredTheme = localStorage.getItem('gigni_editor_theme') || (mode === 'developer' ? 'vs-dark' : 'vs');
        monaco.editor.setTheme(preferredTheme);
        document.getElementById('setting-theme').value = preferredTheme;
      }
    }

    const savedTheme = localStorage.getItem('gigni_compiler_theme') || 'boost';
    setTheme(savedTheme);

    // ─── MOBILE NAV ───
    function toggleMobileMenu() {
      const toggle = document.getElementById('menu-toggle');
      const menu = document.getElementById('mobile-nav');
      toggle.classList.toggle('active');
      menu.classList.toggle('active');
    }

    // ─── SETTINGS MODAL ───
    function toggleSettingsModal() {
      const overlay = document.getElementById('settings-modal-overlay');
      overlay.classList.toggle('active');
    }
    function closeSettingsModalOutside(e) {
      if (e.target.id === 'settings-modal-overlay') {
        toggleSettingsModal();
      }
    }

    function changeEditorSetting(key, val) {
      if (!editor) return;
      const options = {};
      if (key === 'theme') {
        monaco.editor.setTheme(val);
        localStorage.setItem('gigni_editor_theme', val);
      } else if (key === 'fontSize') {
        options.fontSize = parseInt(val);
        localStorage.setItem('gigni_editor_fontsize', val);
      } else if (key === 'tabSize') {
        editor.getModel().updateOptions({ tabSize: parseInt(val) });
        localStorage.setItem('gigni_editor_tabsize', val);
      } else if (key === 'quickSuggestions') {
        const sugg = val === 'true';
        options.quickSuggestions = { other: sugg, comments: sugg, strings: sugg };
        localStorage.setItem('gigni_editor_autocomplete', val);
      }
      editor.updateOptions(options);
    }

    function initSettingsDropdowns() {
      document.getElementById('setting-theme').value = localStorage.getItem('gigni_editor_theme') || (currentTheme === 'developer' ? 'vs-dark' : 'vs');
      document.getElementById('setting-fontsize').value = localStorage.getItem('gigni_editor_fontsize') || '14';
      document.getElementById('setting-tabsize').value = localStorage.getItem('gigni_editor_tabsize') || '4';
      document.getElementById('setting-autocomplete').value = localStorage.getItem('gigni_editor_autocomplete') || 'true';
    }

    // ─── MONACO EDITOR INIT ───
    require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.39.0/min/vs' } });
    require(['vs/editor/editor.main'], () => {
      const storedTheme = localStorage.getItem('gigni_editor_theme') || (currentTheme === 'developer' ? 'vs-dark' : 'vs');
      const storedFontSize = parseInt(localStorage.getItem('gigni_editor_fontsize') || '14');
      const storedTabSize = parseInt(localStorage.getItem('gigni_editor_tabsize') || '4');
      const storedSuggestions = localStorage.getItem('gigni_editor_autocomplete') !== 'false';

      editor = monaco.editor.create(document.getElementById('editor-container'), {
        value: PYTHON_TEMPLATE,
        language: 'python',
        theme: storedTheme,
        automaticLayout: true,
        fontSize: storedFontSize,
        fontFamily: "'Fira Code', 'Consolas', monospace",
        fontLigatures: true,
        minimap: { enabled: true },
        padding: { top: 12, bottom: 12 },
        scrollBeyondLastLine: false,
        smoothScrolling: true,
        cursorBlinking: 'smooth',
        bracketPairColorization: { enabled: true },
        quickSuggestions: { other: storedSuggestions, comments: storedSuggestions, strings: storedSuggestions }
      });

      editor.getModel().updateOptions({ tabSize: storedTabSize });

      initSettingsDropdowns();
    });

    // ─── UTILITY ACTIONS ───
    function formatCode() {
      if (editor) {
        editor.getAction('editor.action.formatDocument').run();
      }
    }

    function clearCode() {
      if (confirm('Reset editor to default template?')) {
        editor.setValue(PYTHON_TEMPLATE);
      }
    }

    function downloadCode() {
      const code = editor.getValue();
      const blob = new Blob([code], { type: 'text/plain;charset=utf-8' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'main.py';
      a.click();
    }

    function copyCode() {
      navigator.clipboard.writeText(editor.getValue()).then(() => {
        const btn = document.getElementById('copy-btn');
        btn.textContent = '📋 Copied!';
        setTimeout(() => { btn.textContent = '📋 Copy'; }, 2000);
      });
    }

    // ─── CONSOLE UTILS ───
    function writeConsole(text, type = '') {
      const el = document.getElementById('terminal-stdout');
      if (el.textContent === 'Console ready. Write code and press ▶ Run.' || el.textContent.startsWith('⏳ Loading Python')) {
        el.textContent = '';
      }
      el.className = type ? 'has-' + type : '';
      el.textContent += text;
      el.scrollTop = el.scrollHeight;
    }

    function clearConsole() {
      document.getElementById('terminal-stdout').textContent = '';
      document.getElementById('terminal-stdout').className = '';
    }

    // ─── PYODIDE RUNTIME ───
    async function getPyodide() {
      if (pyodideInstance) return pyodideInstance;
      if (isPyodideLoading) {
        while (isPyodideLoading) await new Promise(r => setTimeout(r, 100));
        return pyodideInstance;
      }
      isPyodideLoading = true;
      writeConsole('⏳ Loading Python WASM runtime (~3-5s)...\n', 'system');
      try {
        pyodideInstance = await loadPyodide();
        writeConsole('✅ Python WASM runtime loaded.\n\n', 'system');
      } catch (e) {
        writeConsole('❌ Failed to load Pyodide: ' + e.message + '\n', 'error');
      } finally {
        isPyodideLoading = false;
      }
      return pyodideInstance;
    }

    async function runCode() {
      if (!editor) return;
      const code = editor.getValue();
      const stdin = document.getElementById('stdin-textarea').value;

      const runBtn = document.getElementById('run-btn');
      runBtn.disabled = true;
      runBtn.textContent = '⟳ Running...';
      document.getElementById('runtime-status').textContent = '● Executing...';
      document.getElementById('runtime-time').textContent = 'Time: Running...';

      clearConsole();

      const t0 = performance.now();
      try {
        const py = await getPyodide();
        if (!py) throw new Error('Python runtime unavailable.');

        let pyOut = '';
        py.setStdout({ write: c => { pyOut += c; } });
        py.setStderr({ write: c => { pyOut += c; } });

        // Mock sys.stdin with textarea inputs
        await py.runPythonAsync(`
import sys, io
sys.stdin = io.StringIO(${JSON.stringify(stdin)})
`);

        await py.runPythonAsync(code);
        writeConsole(pyOut || 'Program completed with no output.');
        document.getElementById('runtime-status').textContent = '● Finished';
      } catch (e) {
        writeConsole(e.message, 'error');
        document.getElementById('runtime-status').textContent = '● Error';
      } finally {
        const elapsed = ((performance.now() - t0) / 1000).toFixed(3);
        document.getElementById('runtime-time').textContent = `Time: ${elapsed}s`;
        runBtn.disabled = false;
        runBtn.textContent = '▶ Run';
      }
    }

    // Keyboard shortcut Ctrl+Enter to run
    document.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        e.preventDefault();
        runCode();
      }
    });
  </script>
</body>
</html>
