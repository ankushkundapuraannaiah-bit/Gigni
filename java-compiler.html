<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gigni Free Online Java Compiler — Run Java Online | No Login</title>
  <meta name="description" content="Run C code online for free. No login, no setup. Fast C compiler powered by Gigni." />
  <link rel="canonical" href="https://www.gigniconnect.space/java-compiler.html" />

  <!-- Monaco Editor -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --accent: #58a6ff;
      --accent-hover: #79b8ff;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --green: #3fb950;
      --red: #f85149;
      --yellow: #d29922;
      --run-btn: #238636;
      --run-btn-hover: #2ea043;
      --toolbar-bg: #21262d;
      --terminal-bg: #0d1117;
      --terminal-text: #e6edf3;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── NAV ── */
    nav {
      display: flex;
      align-items: center;
      gap: 24px;
      padding: 0 20px;
      height: 52px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .nav-logo { font-weight: 700; font-size: 1.2rem; color: var(--text); text-decoration: none; }
    .nav-links { display: flex; gap: 16px; }
    .nav-links a { color: var(--text-muted); text-decoration: none; font-size: 0.875rem; transition: color 0.2s; }
    .nav-links a:hover, .nav-links a.active { color: var(--text); }

    /* ── LANG TABS ── */
    .lang-tabs {
      display: flex;
      gap: 4px;
      padding: 6px 16px;
      background: var(--toolbar-bg);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      flex-shrink: 0;
    }
    .lang-tabs a {
      padding: 4px 12px;
      border-radius: 6px;
      font-size: 0.8rem;
      color: var(--text-muted);
      text-decoration: none;
      white-space: nowrap;
      transition: background 0.15s, color 0.15s;
    }
    .lang-tabs a:hover { background: var(--border); color: var(--text); }
    .lang-tabs a.active { background: var(--accent); color: #000; font-weight: 600; }

    /* ── TOOLBAR ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: var(--toolbar-bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .toolbar-left { display: flex; align-items: center; gap: 8px; flex: 1; }
    .lang-badge {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--accent);
      padding: 2px 10px;
      border: 1px solid var(--accent);
      border-radius: 20px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      font-size: 0.8rem;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn:hover { background: var(--border); }
    .btn-run {
      background: var(--run-btn);
      border-color: var(--run-btn);
      color: #fff;
      font-weight: 600;
      padding: 5px 18px;
    }
    .btn-run:hover { background: var(--run-btn-hover); border-color: var(--run-btn-hover); }
    .btn-run:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── MAIN LAYOUT ── */
    .main {
      display: flex;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
    }
    @media (min-width: 768px) {
      .main { flex-direction: row; }
    }

    /* ── EDITOR PANE ── */
    .editor-pane {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
    }
    #editor { flex: 1; }

    /* ── RIGHT PANE (stdin + terminal) ── */
    .right-pane {
      display: flex;
      flex-direction: column;
      width: 100%;
      min-height: 0;
    }
    @media (min-width: 768px) {
      .right-pane { width: 380px; }
    }

    .pane-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 12px;
      background: var(--toolbar-bg);
      border-bottom: 1px solid var(--border);
      font-size: 0.78rem;
      color: var(--text-muted);
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      flex-shrink: 0;
    }
    .pane-header .btn { text-transform: none; letter-spacing: 0; }

    #stdin {
      width: 100%;
      height: 90px;
      background: var(--surface);
      color: var(--text);
      border: none;
      border-bottom: 1px solid var(--border);
      padding: 8px 12px;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 0.82rem;
      resize: none;
      outline: none;
      flex-shrink: 0;
    }

    .terminal-wrapper {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    #terminal {
      flex: 1;
      background: var(--terminal-bg);
      color: var(--terminal-text);
      padding: 12px;
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 0.83rem;
      line-height: 1.6;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .terminal-prompt { color: var(--text-muted); user-select: none; }
    .terminal-success { color: var(--green); }
    .terminal-error { color: var(--red); }
    .terminal-info { color: var(--accent); }
    .terminal-warn { color: var(--yellow); }

    /* ── SPINNER ── */
    .spinner {
      display: inline-block;
      width: 12px; height: 12px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 4px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── SETTINGS MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 24px;
      min-width: 300px;
      max-width: 90vw;
    }
    .modal h3 { margin-bottom: 16px; font-size: 1rem; }
    .modal label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 4px; margin-top: 12px; }
    .modal select {
      width: 100%;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 0.9rem;
    }
    .modal-close { margin-top: 16px; width: 100%; }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="/index.html" class="nav-logo">GIGNI</a>
  <div class="nav-links">
    <a href="/index.html">Home</a>
    <a href="/about.html">About</a>
    <a href="/compiler.html">Compiler</a>
    <a href="/zorus.html">Zorus 2.1</a>
  </div>
</nav>

<!-- LANG TABS -->
<div class="lang-tabs">
  <a href="/python-compiler.html">🐍 Python</a>
  <a href="/javascript-compiler.html">⚡ JavaScript</a>
  <a href="/c-compiler.html">🔵 C</a>
  <a href="/cpp-compiler.html">🔷 C++</a>
  <a href="/java-compiler.html" class="active">☕ Java</a>
  <a href="/compiler.html">🌐 HTML/CSS</a>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="toolbar-left">
    <span class="lang-badge">☕ Java</span>
    <button class="btn" onclick="beautifyCode()">✨ Beautify</button>
    <button class="btn" onclick="openSettings()">⚙️ Settings</button>
    <button class="btn" onclick="resetCode()">↺ Reset</button>
    <button class="btn" onclick="downloadCode()">⬇ Download</button>
    <button class="btn" onclick="copyCode()">📋 Copy</button>
  </div>
  <button class="btn btn-run" id="runBtn" onclick="runCode()">▶ Run</button>
</div>

<!-- MAIN -->
<div class="main">
  <!-- Editor -->
  <div class="editor-pane">
    <div id="editor"></div>
  </div>

  <!-- Right: stdin + terminal -->
  <div class="right-pane">
    <div class="pane-header">📥 Standard Input (stdin)</div>
    <textarea id="stdin" placeholder="Optional stdin input…"></textarea>

    <div class="terminal-wrapper">
      <div class="pane-header">
        Terminal Output
        <button class="btn" onclick="clearTerminal()">🧹 Clear</button>
      </div>
      <div id="terminal"><span class="terminal-prompt">Console ready. Write code and press ▶ Run.</span></div>
    </div>
  </div>
</div>

<!-- SETTINGS MODAL -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <h3>⚙️ Editor Settings</h3>
    <label>Editor Theme</label>
    <select id="themeSelect" onchange="applySettings()">
      <option value="vs">Light (vs)</option>
      <option value="vs-dark" selected>Dark (vs-dark)</option>
      <option value="hc-black">High Contrast</option>
    </select>
    <label>Font Size</label>
    <select id="fontSelect" onchange="applySettings()">
      <option value="12">12 px</option>
      <option value="14" selected>14 px</option>
      <option value="16">16 px</option>
      <option value="18">18 px</option>
      <option value="20">20 px</option>
    </select>
    <label>Tab Size</label>
    <select id="tabSelect" onchange="applySettings()">
      <option value="2">2 spaces</option>
      <option value="4" selected>4 spaces</option>
      <option value="8">8 spaces</option>
    </select>
    <label>Autocomplete</label>
    <select id="autoSelect" onchange="applySettings()">
      <option value="on" selected>Enable</option>
      <option value="off">Disable</option>
    </select>
    <button class="btn modal-close" onclick="closeSettings()">✓ Done</button>
  </div>
</div>

<script>
const DEFAULT_CODE = `public class Main {
    public static void main(String[] args) {
        System.out.println("Hello, World!");
    }
}`;

const LANGUAGE = 'java';
const JDOODLE_LANG = 'java';
const JDOODLE_VERSION_INDEX = '4';
const FILE_EXT = 'java';

let editor;

// ── Monaco setup ──
require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' } });
require(['vs/editor/editor.main'], () => {
  editor = monaco.editor.create(document.getElementById('editor'), {
    value: DEFAULT_CODE,
    language: LANGUAGE,
    theme: 'vs-dark',
    fontSize: 14,
    tabSize: 4,
    minimap: { enabled: false },
    automaticLayout: true,
    suggestOnTriggerCharacters: true,
    quickSuggestions: true,
    scrollBeyondLastLine: false,
    wordWrap: 'on',
  });

  // Ctrl+Enter to run
  editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.Enter, runCode);
});

// ── Run ──
async function runCode() {
  const code = editor.getValue();
  const stdin = document.getElementById('stdin').value;
  const btn = document.getElementById('runBtn');

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Running…';
  terminalWrite('', true);
  terminalAppend('<span class="terminal-info">▶ Compiling & running…</span>\n');

  try {
    // Primary: call your own backend /api/compile
    const result = await callBackend(code, stdin);
    displayResult(result);
  } catch (err) {
    terminalAppend(`<span class="terminal-error">✖ Error: ${escHtml(err.message)}</span>\n`);
    terminalAppend(`<span class="terminal-warn">Tip: Check your network or server status.</span>\n`);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '▶ Run';
  }
}

async function callBackend(code, stdin) {
  const res = await fetch('/api/compile', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      language: JDOODLE_LANG,
      versionIndex: JDOODLE_VERSION_INDEX,
      script: code,
      stdin: stdin
    })
  });

  if (!res.ok) {
    const text = await res.text();
    throw new Error(`Server responded ${res.status}: ${text}`);
  }

  const data = await res.json();
  return data;
}

function displayResult(data) {
  // Handle JDoodle response format: { output, statusCode, memory, cpuTime, error }
  // Handle Piston format: { run: { stdout, stderr, code } }
  let stdout = '', stderr = '', exitCode = 0;

  if (data.run) {
    // Piston format
    stdout = data.run.stdout || '';
    stderr = data.run.stderr || '';
    exitCode = data.run.code ?? 0;
  } else {
    // JDoodle format
    stdout = data.output || '';
    stderr = data.error || '';
    exitCode = data.statusCode || 0;

    // JDoodle embeds errors in output with specific patterns
    if (stdout.includes('error:') || stdout.includes('Error:')) {
      stderr = stdout;
      stdout = '';
    }
  }

  if (stdout) {
    terminalAppend(`<span class="terminal-success">${escHtml(stdout)}</span>`);
  }
  if (stderr) {
    terminalAppend(`\n<span class="terminal-error">${escHtml(stderr)}</span>`);
  }
  if (!stdout && !stderr) {
    terminalAppend('<span class="terminal-warn">(no output)</span>');
  }

  const memInfo = data.memory ? `  Memory: ${data.memory}` : '';
  const cpuInfo = data.cpuTime ? `  CPU: ${data.cpuTime}s` : '';
  if (memInfo || cpuInfo) {
    terminalAppend(`\n<span class="terminal-info">─────${memInfo}${cpuInfo}</span>`);
  }
}

// ── Terminal helpers ──
function terminalWrite(html, clear = false) {
  const t = document.getElementById('terminal');
  if (clear) t.innerHTML = '';
  if (html) t.innerHTML += html;
  t.scrollTop = t.scrollHeight;
}
function terminalAppend(html) { terminalWrite(html); }
function clearTerminal() {
  document.getElementById('terminal').innerHTML = '<span class="terminal-prompt">Console cleared.</span>';
}
function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── Beautify ──
function beautifyCode() {
  if (!editor) return;
  editor.getAction('editor.action.formatDocument')?.run();
}

// ── Reset ──
function resetCode() {
  if (editor && confirm('Reset to default code?')) editor.setValue(DEFAULT_CODE);
}

// ── Download ──
function downloadCode() {
  if (!editor) return;
  const blob = new Blob([editor.getValue()], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `main.${FILE_EXT}`;
  a.click();
}

// ── Copy ──
function copyCode() {
  if (!editor) return;
  navigator.clipboard.writeText(editor.getValue()).then(() => {
    const btn = [...document.querySelectorAll('.btn')].find(b => b.textContent.includes('Copy'));
    if (btn) { const orig = btn.textContent; btn.textContent = '✓ Copied!'; setTimeout(() => btn.textContent = orig, 1500); }
  });
}

// ── Settings ──
function openSettings() { document.getElementById('settingsModal').classList.add('open'); }
function closeSettings() { document.getElementById('settingsModal').classList.remove('open'); }
function applySettings() {
  if (!editor) return;
  const theme = document.getElementById('themeSelect').value;
  const fontSize = parseInt(document.getElementById('fontSelect').value);
  const tabSize = parseInt(document.getElementById('tabSelect').value);
  const suggest = document.getElementById('autoSelect').value === 'on';
  monaco.editor.setTheme(theme);
  editor.updateOptions({ fontSize, tabSize, suggestOnTriggerCharacters: suggest, quickSuggestions: suggest });
}

// Close modal on backdrop click
document.getElementById('settingsModal').addEventListener('click', function(e) {
  if (e.target === this) closeSettings();
});
</script>
</body>
