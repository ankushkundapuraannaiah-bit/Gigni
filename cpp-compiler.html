<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Gigni Free Online C++ Compiler</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #0f1117; color: #e2e8f0; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
  header { height: 46px; background: #1a1d2e; border-bottom: 1px solid #2a2d3e; display: flex; align-items: center; padding: 0 16px; gap: 14px; flex-shrink: 0; }
  .logo { font-weight: 800; font-size: 1.1rem; color: #a78bfa; letter-spacing: 2px; }
  header nav a { color: #64748b; text-decoration: none; font-size: 0.82rem; margin-right: 12px; }
  header nav a:hover { color: #e2e8f0; }
  .lang-tabs { margin-left: auto; display: flex; gap: 5px; }
  .lang-tabs a { color: #64748b; text-decoration: none; font-size: 0.75rem; padding: 3px 9px; border-radius: 20px; border: 1px solid #2a2d3e; }
  .lang-tabs a.active, .lang-tabs a:hover { color: #e2e8f0; border-color: #7c3aed; background: rgba(124,58,237,0.15); }
  .toolbar { height: 42px; background: #1a1d2e; border-bottom: 1px solid #2a2d3e; display: flex; align-items: center; padding: 0 12px; gap: 8px; flex-shrink: 0; }
  .lang-badge { background: rgba(124,58,237,0.2); border: 1px solid #7c3aed; color: #a78bfa; font-size: 0.75rem; padding: 3px 10px; border-radius: 20px; font-weight: 600; }
  .spacer { flex: 1; }
  .btn { padding: 5px 12px; border-radius: 5px; border: 1px solid #2a2d3e; background: transparent; color: #e2e8f0; font-size: 0.8rem; cursor: pointer; white-space: nowrap; }
  .btn:hover { background: rgba(255,255,255,0.06); border-color: #7c3aed; }
  .btn-run { background: #7c3aed; border-color: #7c3aed; font-weight: 700; }
  .btn-run:hover { background: #6d28d9; }
  .btn-run:disabled { opacity: 0.5; cursor: not-allowed; }
  .workspace { height: calc(100vh - 46px - 42px); display: flex; }
  .editor-pane { flex: 1; display: flex; flex-direction: column; border-right: 1px solid #2a2d3e; min-width: 0; }
  #monaco-container { flex: 1; min-height: 0; width: 100%; }
  .stdin-row { height: 36px; background: #1a1d2e; border-top: 1px solid #2a2d3e; display: flex; align-items: center; padding: 0 10px; gap: 8px; flex-shrink: 0; }
  .stdin-row label { font-size: 0.75rem; color: #64748b; white-space: nowrap; }
  .stdin-row input { flex: 1; background: #0f1117; border: 1px solid #2a2d3e; color: #e2e8f0; border-radius: 4px; padding: 3px 7px; font-size: 0.8rem; font-family: monospace; }
  .stdin-row input:focus { outline: none; border-color: #7c3aed; }
  .output-pane { width: 400px; display: flex; flex-direction: column; flex-shrink: 0; }
  .out-header { height: 36px; background: #1a1d2e; border-bottom: 1px solid #2a2d3e; display: flex; align-items: center; padding: 0 12px; gap: 8px; font-size: 0.8rem; flex-shrink: 0; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; flex-shrink: 0; }
  .dot.running { background: #eab308; animation: blink 0.8s infinite; }
  .dot.err { background: #ef4444; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
  .out-header .sp { flex:1; }
  .out-header #exec-time { font-size: 0.72rem; color: #64748b; }
  .out-header button { background: none; border: none; color: #64748b; cursor: pointer; font-size: 0.78rem; }
  .out-header button:hover { color: #e2e8f0; }
  #output { flex: 1; overflow-y: auto; padding: 12px 14px; font-family: 'Consolas', 'Courier New', monospace; font-size: 0.8rem; line-height: 1.65; white-space: pre-wrap; word-break: break-all; }
  .meta { color: #475569; } .fail { color: #ef4444; }
</style>
</head>
<body>
<header>
  <span class="logo">GIGNI</span>
  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="compiler.html">Compiler</a>
    <a href="zorus.html">Zorus 2.1</a>
  </nav>
  <div class="lang-tabs">
    <a href="python-compiler.html">🐍 Python</a>
    <a href="javascript-compiler.html">⚡ JavaScript</a>
    <a href="c-compiler.html">🔵 C</a>
    <a href="cpp-compiler.html" class="active">🔷 C++</a>
    <a href="java-compiler.html">☕ Java</a>
    <a href="compiler.html">🌐 HTML/CSS</a>
  </div>
</header>
<div class="toolbar">
  <span class="lang-badge">🔷 C++ (via Piston API)</span>
  <span class="spacer"></span>
  <button class="btn" onclick="beautify()">✨ Beautify</button>
  <button class="btn" onclick="resetCode()">↺ Reset</button>
  <button class="btn" onclick="download()">⬇ Download</button>
  <button class="btn" onclick="copyCode()">📋 Copy</button>
  <button class="btn btn-run" id="runBtn" onclick="run()">▶ Run</button>
</div>
<div class="workspace">
  <div class="editor-pane">
    <div id="monaco-container"></div>
    <div class="stdin-row">
      <label>📥 Stdin:</label>
      <input id="stdin" type="text" placeholder="Enter input for your program…"/>
    </div>
  </div>
  <div class="output-pane">
    <div class="out-header">
      <div class="dot" id="dot"></div>
      <span>Terminal Output</span>
      <span class="sp"></span>
      <span id="exec-time"></span>
      <button onclick="clearOut()">🧹 Clear</button>
    </div>
    <div id="output"><span class="meta">Console ready. Write code and press ▶ Run.</span></div>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
<script>
const DEFAULT = `#include <iostream>
#include <vector>
#include <string>
using namespace std;

void greet(const string& name) {
    cout << "Hello, " << name << "! 👋" << endl;
}

int main() {
    vector<string> names = {"Alice", "Bob", "World"};
    for (const auto& n : names) {
        greet(n);
    }
    return 0;
}`;

let editor = null;
require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' } });
require(['vs/editor/editor.main'], function () {
  editor = monaco.editor.create(document.getElementById('monaco-container'), {
    value: DEFAULT,
    language: 'cpp',
    theme: 'vs-dark',
    fontSize: 14,
    tabSize: 4,
    readOnly: false,
    minimap: { enabled: false },
    automaticLayout: true,
    scrollBeyondLastLine: false,
    wordWrap: 'off',
    lineNumbers: 'on',
  });
});

async function run() {
  const code  = editor ? editor.getValue() : '';
  const stdin = document.getElementById('stdin').value;
  const btn   = document.getElementById('runBtn');
  const dot   = document.getElementById('dot');
  const out   = document.getElementById('output');
  btn.disabled = true; dot.className = 'dot running';
  out.innerHTML = '<span class="meta">⏳ Compiling…</span>';
  document.getElementById('exec-time').textContent = '';
  const t0 = Date.now();
  try {
    const resp = await fetch('https://emkc.org/api/v2/piston/execute', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ language: 'c++', version: '*', files: [{ name: 'main.cpp', content: code }], stdin }),
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    const ms = Date.now() - t0;
    document.getElementById('exec-time').textContent = `⏱ ${(ms/1000).toFixed(2)}s`;
    const stdout = data.run?.stdout || '';
    const stderr = data.run?.stderr || '';
    const cerr   = data.compile?.stderr || '';
    if (cerr) { dot.className='dot err'; out.innerHTML=`<span class="fail">Compile error:\n${esc(cerr)}</span>`; }
    else if (stderr) { dot.className='dot err'; out.innerHTML=(stdout?esc(stdout)+'\n':'')+`<span class="fail">${esc(stderr)}</span>`; }
    else { dot.className='dot'; out.innerHTML=stdout?`<span class="meta">● Done (${(ms/1000).toFixed(2)}s)</span>\n${esc(stdout)}`:`<span class="meta">● Done — no output.</span>`; }
  } catch(e) {
    dot.className='dot err'; out.innerHTML=`<span class="fail">❌ ${esc(e.message)}</span>`;
  } finally { btn.disabled=false; }
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function clearOut(){document.getElementById('output').innerHTML='<span class="meta">Cleared.</span>';document.getElementById('dot').className='dot';document.getElementById('exec-time').textContent='';}
function copyCode(){if(editor)navigator.clipboard.writeText(editor.getValue());}
function resetCode(){if(editor)editor.setValue(DEFAULT);}
function beautify(){editor?.getAction('editor.action.formatDocument')?.run();}
function download(){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([editor?.getValue()||''],{type:'text/plain'}));a.download='main.cpp';a.click();}
</script>
</body>
</html>
